<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pocket Report</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .loading-card,
      .error-state {
        width: min(520px, 100%);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.92);
        color: #e2e8f0;
        text-align: center;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.4);
      }

      .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto 18px;
        border-radius: 999px;
        border: 4px solid rgba(148, 163, 184, 0.14);
        border-top-color: #22c55e;
        animation: spin 0.9s linear infinite;
      }

      .loading-card h1,
      .error-state h1 {
        margin: 0 0 12px;
        font-size: 26px;
      }

      .loading-card p,
      .error-state p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }

      .error-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.14);
        color: #fdba74;
        font-size: 28px;
        font-weight: 700;
      }

      #retryButton {
        margin-top: 18px;
        appearance: none;
        border: 1px solid rgba(125, 211, 252, 0.24);
        background: rgba(14, 116, 144, 0.14);
        color: #bae6fd;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      #retryButton:hover {
        background: rgba(14, 116, 144, 0.24);
      }

      .hidden {
        display: none !important;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-card">
        <div class="spinner"></div>
        <h1>Preparing report</h1>
        <p id="loadingMessage">Loading report...</p>
      </div>
    </div>

    <main id="reportContainer" class="hidden"></main>

    <script type="module" src="./report-viewer.js"></script>
  </body>
</html>
